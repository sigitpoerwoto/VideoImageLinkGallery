<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Bookmark - WP7 Final Edit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000000; color: #ffffff; margin: 0; padding: 0; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; }
        ::-webkit-scrollbar-thumb:hover { background: #0078D7; }
        
        input[type="text"], input[type="url"], textarea, select {
            background-color: #111111; border: 2px solid #333333; color: white; border-radius: 0;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: #0078D7; outline: none; }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .btn-wp7 { 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
            background: transparent; border: none; padding: 0; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-wp7:hover { opacity: 0.7; }
        
        .pivot-active { color: #ffffff; font-weight: 300; font-size: 2.5rem; line-height: 1; transition: color 0.3s; }
        .pivot-inactive { color: #555555; font-weight: 300; font-size: 2.5rem; line-height: 1; transition: color 0.3s; cursor: pointer; }
        .pivot-inactive:hover { color: #888888; }
        
        @media (max-width: 768px) { .pivot-active, .pivot-inactive { font-size: 1.75rem; } }

        .zoomed { transform: scale(2); cursor: zoom-out !important; }

        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: #0078D7; cursor: pointer; margin-top: -6px; border-radius: 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #333; }
        
        .highlight-item { outline: 4px solid #FFB900; box-shadow: 0 0 20px #FFB900; z-index: 10; transition: outline 0.3s, box-shadow 0.3s; }
    </style>
</head>
<body class="min-h-screen pb-10 flex flex-col" id="bodyWrap">

    <header class="bg-[#000000] pt-6 pb-2 sticky top-0 z-40" id="navWrap">
        <div class="px-6 mx-auto w-full max-w-[1600px]">
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-baseline gap-3">
                    <h1 class="text-xl font-bold uppercase tracking-widest text-[#0078D7]">Gallery<span class="text-[#666] font-normal">WP7</span></h1>
                </div>
                <button onclick="toggleSafeMode()" id="safeModeBtn" class="btn-wp7 text-[#107C10] text-xs flex items-center gap-1">
                    <span class="text-lg leading-none">🛡️</span> SAFE: ON
                </button>
            </div>

            <div class="flex gap-6 overflow-x-auto pb-4 mb-2 no-scrollbar border-b border-[#222]">
                <button onclick="openModal('add')" class="btn-wp7 text-[#0078D7] whitespace-nowrap">+ LINK</button>
                <button onclick="openBulkModal()" class="btn-wp7 text-[#5C2D91] whitespace-nowrap">📥 BULK</button>
                <button onclick="document.getElementById('importM3uFile').click()" class="btn-wp7 text-[#107C10] whitespace-nowrap">📥 IMPORT M3U</button>
                <input type="file" id="importM3uFile" accept=".m3u,.m3u8,.txt" class="hidden" onchange="importM3uData(event)">
                <button onclick="openM3uModal()" class="btn-wp7 text-[#D83B01] whitespace-nowrap">📺 EXPORT M3U</button>
                
                <span class="text-[#444]">|</span>
                
                <button onclick="openImportUrlModal()" class="btn-wp7 text-[#0078D7] whitespace-nowrap">☁️ IMPORT URL</button>
                <button onclick="exportData()" class="btn-wp7 text-[#888888] whitespace-nowrap">⬇️ EXPORT TXT</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-wp7 text-[#888888] whitespace-nowrap">⬆️ IMPORT TXT</button>
                <input type="file" id="importFile" accept=".txt" class="hidden" onchange="importData(event)">
                
                <span class="text-[#444]">|</span>

                <button onclick="undoLastAction()" class="btn-wp7 text-[#FFB900] whitespace-nowrap">↩️ UNDO</button>
                <button onclick="clearCache()" class="btn-wp7 text-[#E81123] whitespace-nowrap">🗑️ RESET</button>
            </div>

            <div class="flex gap-6 overflow-x-auto no-scrollbar pt-2 mb-4">
                <span id="tab-all" onclick="setMediaFilter('all')" class="pivot-active">semua</span>
                <span id="tab-image" onclick="setMediaFilter('image')" class="pivot-inactive">gambar</span>
                <span id="tab-video" onclick="setMediaFilter('video')" class="pivot-inactive">video</span>
                <span id="tab-website" onclick="setMediaFilter('website')" class="pivot-inactive">web</span>
            </div>

            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 bg-[#111111] p-3">
                <div class="relative w-full xl:w-1/4 flex-shrink-0">
                    <input type="text" id="searchInput" placeholder="Cari tag, catatan, kategori..." class="w-full p-2 text-sm bg-[#000] border-none">
                    <button onclick="clearSearch()" class="absolute right-3 top-2 text-[#666] hover:text-white font-bold">✕</button>
                </div>
                
                <div class="flex flex-wrap items-center gap-3 text-xs font-bold text-[#888] w-full xl:w-auto justify-start xl:justify-end">
                    <label class="flex items-center gap-2 cursor-pointer hover:text-white transition">
                        <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()" class="w-4 h-4 accent-[#0078D7] rounded-none"> PILIH SEMUA
                    </label>
                    
                    <div id="bulkActions" class="hidden items-center gap-3 border-l border-[#444] pl-3">
                        <span class="text-[#0078D7]"><span id="selectedCount">0</span> ITEM:</span>
                        <button onclick="deleteSelected()" class="btn-wp7 text-[#E81123] whitespace-nowrap hover:text-white transition">HAPUS</button>
                        <button onclick="markSelectedNsfw(true)" class="btn-wp7 text-[#D83B01] whitespace-nowrap hover:text-white transition">+NSFW</button>
                        <button onclick="markSelectedNsfw(false)" class="btn-wp7 text-[#107C10] whitespace-nowrap hover:text-white transition">-NSFW</button>
                        <button onclick="markSelectedCategory('TV')" class="btn-wp7 text-[#0078D7] whitespace-nowrap hover:text-white transition">📺 SET TV</button>
                    </div>
                    
                    <span class="border-l border-[#444] pl-3 whitespace-nowrap"><span id="itemCount" class="text-white">0</span> ITEM</span>
                    
                    <select id="sortSelect" onchange="renderGallery()" class="p-1 bg-transparent border-none text-[#0078D7] font-bold cursor-pointer outline-none">
                        <option value="newest">TERBARU</option>
                        <option value="oldest">TERLAMA</option>
                        <option value="category">KATEGORI</option>
                    </select>

                    <div class="flex items-center gap-1 border-l border-[#444] pl-3">
                        <button onclick="changePage(-1)" class="btn-wp7 bg-[#222] text-[#0078D7] hover:bg-[#0078D7] hover:text-white px-2 py-1 text-lg leading-none transition-colors border border-[#333]">&lt;</button>
                        <span class="text-[10px] font-bold text-[#888] tracking-widest pl-1">HAL</span>
                        <input type="number" id="pageInput" onchange="jumpToPage(this.value)" value="1" min="1" class="w-10 text-center bg-[#000] text-white border border-[#444] text-[10px] font-bold outline-none focus:border-[#0078D7] py-1 mx-1">
                        <span id="maxPageInfo" class="text-[10px] font-bold text-[#888] whitespace-nowrap tracking-widest">/ 1</span>
                        <button onclick="changePage(1)" class="btn-wp7 bg-[#222] text-[#0078D7] hover:bg-[#0078D7] hover:text-white px-2 py-1 text-lg leading-none transition-colors border border-[#333]">&gt;</button>
                        <button onclick="refreshThumbnails()" class="btn-wp7 text-[#107C10] hover:text-white text-lg leading-none transition-colors ml-2 px-1" title="Refresh Thumbnail">🔄</button>
                    </div>

                    <div class="flex items-center gap-2 border-l border-[#444] pl-3">
                        <input type="number" id="itemJumpInput" placeholder="No. Item" onkeydown="if(event.key==='Enter') jumpToItem()" class="w-16 text-center bg-[#000] text-[#FFB900] border border-[#444] text-[10px] font-bold outline-none focus:border-[#FFB900] py-1">
                        <button onclick="jumpToItem()" class="btn-wp7 text-[#FFB900] hover:text-white transition">LOMPAT</button>
                    </div>
                </div>
            </div>
            
        </div>
    </header>

    <main class="w-full max-w-[1600px] mx-auto px-6 py-2 flex-grow">
        <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-[2px] bg-[#000]" id="galleryGrid"></div>
    </main>

    <div id="viewerModal" class="hidden fixed inset-0 bg-[#000000] z-[100] flex flex-col transition-all duration-300 overflow-hidden">
        <div class="flex justify-between items-center p-6 text-white absolute top-0 w-full z-20 bg-gradient-to-b from-black to-transparent">
            <div class="flex items-center gap-6">
                <span id="viewerCategory" class="text-[#0078D7] text-sm font-bold uppercase tracking-widest"></span>
                <div id="zoomControl" class="hidden items-center gap-3">
                    <span class="text-xs font-bold text-[#666]">ZOOM</span>
                    <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" class="w-32">
                </div>
                <button id="viewerEditBtn" class="btn-wp7 text-[#FFB900] hover:text-white hidden md:block border border-[#FFB900] px-3 py-1">✏️ EDIT INFO</button>
                <button onclick="toggleNativeFullscreen()" class="btn-wp7 text-white hover:text-[#0078D7] hidden md:block">⛶ FULLSCREEN</button>
            </div>
            <button onclick="closeViewer()" class="text-5xl font-light hover:text-[#D83B01] leading-none">&times;</button>
        </div>
        <div id="viewerContent" class="flex-grow flex justify-center items-center w-full h-full pt-16 pb-20 overflow-hidden relative"></div>
        <div class="absolute bottom-0 w-full p-8 bg-gradient-to-t from-black to-transparent flex flex-col items-start z-20 pointer-events-none">
            <p id="viewerNotes" class="text-white text-xl font-light mb-3 max-w-4xl drop-shadow-md"></p>
            <div id="viewerTags" class="flex flex-wrap gap-3 pointer-events-auto"></div>
        </div>
    </div>

    <div id="m3uModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
        <div class="bg-[#111111] border-2 border-[#333333] w-full max-w-md p-8">
            <h2 class="text-2xl font-light mb-2 text-white uppercase tracking-wider">Export M3U</h2>
            <p class="text-xs text-[#888888] mb-6">Pilih kategori. <i id="m3uSafeWarning" class="text-[#D83B01]"></i></p>
            <input type="text" id="m3uFileName" value="My_TV_Playlist" class="w-full p-3 mb-6 bg-[#000] border border-[#444] outline-none text-white focus:border-[#D83B01]">
            <div id="m3uCheckboxContainer" class="border border-[#333] p-4 max-h-48 overflow-y-auto space-y-3 mb-8 bg-[#000]"></div>
            <div class="flex gap-8">
                <button onclick="executeM3uExport()" class="btn-wp7 text-[#D83B01] text-sm">UNDUH FILE</button>
                <button onclick="document.getElementById('m3uModal').classList.add('hidden')" class="btn-wp7 text-[#888888] text-sm">BATAL</button>
            </div>
        </div>
    </div>

    <div id="importUrlModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
        <div class="bg-[#111111] border-2 border-[#333333] w-full max-w-xl p-8">
            <h2 class="text-2xl font-light mb-4 text-white uppercase tracking-wider text-[#0078D7]">☁️ Import dari URL</h2>
            <p class="text-xs text-[#888888] mb-6 tracking-wide leading-relaxed">Ambil file database TXT (JSON) atau Playlist M3U langsung dari situs web (seperti Raw Github). Sistem ini dilengkapi Auto-Proxy untuk menembus jaringan.</p>
            <input type="url" id="importUrlInput" placeholder="https://raw.githubusercontent.com/..." class="w-full p-4 mb-4 bg-[#000] border border-[#444] text-white outline-none focus:border-[#0078D7]">
            <select id="importUrlType" class="w-full p-4 mb-8 bg-[#000] border border-[#444] text-[#aaa] outline-none focus:border-[#0078D7] cursor-pointer">
                <option value="auto">Deteksi Otomatis (.txt / .m3u)</option>
                <option value="txt">Paksa format TXT Database (JSON)</option>
                <option value="m3u">Paksa format M3U Playlist</option>
            </select>
            <div class="flex gap-8">
                <button onclick="executeUrlImport()" class="btn-wp7 text-[#0078D7] text-sm" id="btnExecuteUrl">AMBIL DATA</button>
                <button onclick="document.getElementById('importUrlModal').classList.add('hidden')" class="btn-wp7 text-[#888888] text-sm">BATAL</button>
            </div>
        </div>
    </div>

    <div id="formModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
        <div class="bg-[#111111] border-2 border-[#333333] w-full max-w-md p-8">
            <h2 id="modalTitle" class="text-2xl font-light mb-8 text-white uppercase tracking-wider">Simpan Link</h2>
            <form id="mediaForm" class="space-y-5">
                <input type="hidden" id="editId">
                <input type="url" id="urlInput" required placeholder="Paste Link di sini..." class="w-full p-3 bg-[#000] border border-[#444] outline-none focus:border-[#0078D7] text-white">
                <select id="typeOverride" class="w-full p-3 bg-[#000] border border-[#444] outline-none text-[#aaa] focus:border-[#0078D7]">
                    <option value="auto">Deteksi Otomatis (Media)</option>
                    <option value="website">Paksa Tipe: Website / Artikel</option>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="categoryInput" placeholder="Kategori" class="w-full p-3 bg-[#000] border border-[#444] outline-none focus:border-[#0078D7] text-white">
                    <input type="text" id="tagsInput" placeholder="Tags (Selain NSFW)" class="w-full p-3 bg-[#000] border border-[#444] outline-none focus:border-[#0078D7] text-white">
                </div>
                <textarea id="notesInput" rows="2" placeholder="Catatan" class="w-full p-3 bg-[#000] border border-[#444] outline-none focus:border-[#0078D7] text-white"></textarea>
                <label class="flex items-center gap-3 text-xs font-bold tracking-widest text-[#D83B01] p-4 border border-[#333333] bg-[#000000] cursor-pointer hover:border-[#D83B01] transition">
                    <input type="checkbox" id="nsfwCheckbox" class="w-5 h-5 accent-[#D83B01] cursor-pointer rounded-none">
                    TANDAI NSFW (PRIVATE)
                </label>
                <div class="flex gap-8 pt-4">
                    <button type="submit" class="btn-wp7 text-[#0078D7] text-sm">SIMPAN</button>
                    <button type="button" onclick="document.getElementById('formModal').classList.add('hidden')" class="btn-wp7 text-[#888888] text-sm">BATAL</button>
                </div>
            </form>
        </div>
    </div>

    <div id="bulkModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
        <div class="bg-[#111111] border-2 border-[#333333] w-full max-w-2xl p-8">
            <h2 class="text-2xl font-light mb-8 text-white uppercase tracking-wider">Bulk Import</h2>
            <form id="bulkForm" class="space-y-5">
                <div class="flex items-center gap-4 bg-[#000000] p-3 border border-[#444]">
                    <label class="text-xs font-bold text-[#888] tracking-widest">FILE .TXT:</label>
                    <input type="file" id="txtFileInput" accept=".txt" class="text-xs text-white border-none bg-transparent">
                </div>
                <textarea id="bulkTextarea" required rows="6" placeholder="Paste link per baris..." class="w-full p-4 bg-[#000] border border-[#444] text-sm outline-none focus:border-[#5C2D91] whitespace-pre text-white"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="bulkCategory" placeholder="Kategori Batch" class="w-full p-3 bg-[#000] border border-[#444] outline-none focus:border-[#5C2D91] text-white">
                    <input type="text" id="bulkTags" placeholder="Tags Batch" class="w-full p-3 bg-[#000] border border-[#444] outline-none focus:border-[#5C2D91] text-white">
                </div>
                <label class="flex items-center gap-3 text-xs font-bold tracking-widest text-[#D83B01] p-4 border border-[#333333] bg-[#000000] cursor-pointer hover:border-[#D83B01] transition">
                    <input type="checkbox" id="bulkNsfwCheckbox" class="w-5 h-5 accent-[#D83B01] cursor-pointer rounded-none">
                    TANDAI SEMUA NSFW
                </label>
                <div class="flex gap-8 pt-4">
                    <button type="submit" class="btn-wp7 text-[#5C2D91] text-sm">PROSES</button>
                    <button type="button" onclick="document.getElementById('bulkModal').classList.add('hidden')" class="btn-wp7 text-[#888888] text-sm">BATAL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let galleryData = JSON.parse(localStorage.getItem('smartGalleryData')) || [];
        
        let needsSave = false;
        galleryData = galleryData.map(item => {
            if (item.url && item.url.toLowerCase().includes('.gifv')) {
                item.url = item.url.replace(/\.gifv(\?.*)?$/i, '.mp4$1');
                item.type = 'video';
                needsSave = true;
            }
            return item;
        });
        if (needsSave) {
            localStorage.setItem('smartGalleryData', JSON.stringify(galleryData));
        }

        const grid = document.getElementById('galleryGrid');
        let activeHlsEngine = null; 
        let activeDashEngine = null; 
        
        let isSafeMode = true;
        let currentMediaFilter = 'all';
        let currentScale = 1; let isPanning = false; let panX = 0, panY = 0; let startPanX = 0, startPanY = 0;

        let currentPage = 1;
        const itemsPerPage = 60; 
        let filteredDataLength = 0;

        function refreshThumbnails() {
            renderGallery(document.getElementById('searchInput').value, true);
        }

        function changePage(direction) {
            const maxPage = Math.ceil(filteredDataLength / itemsPerPage) || 1;
            currentPage += direction;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > maxPage) currentPage = maxPage;
            
            document.getElementById('pageInput').value = currentPage;
            renderGallery(document.getElementById('searchInput').value, true); 
            window.scrollTo(0, 0); 
        }

        function jumpToPage(val) {
            const maxPage = Math.ceil(filteredDataLength / itemsPerPage) || 1;
            let p = parseInt(val);
            if (isNaN(p) || p < 1) p = 1;
            if (p > maxPage) p = maxPage;
            currentPage = p;
            document.getElementById('pageInput').value = currentPage;
            renderGallery(document.getElementById('searchInput').value, true);
            window.scrollTo(0, 0);
        }

        function jumpToItem() {
            let itemIndex = parseInt(document.getElementById('itemJumpInput').value);
            if (isNaN(itemIndex) || itemIndex < 1) return;
            if (itemIndex > filteredDataLength) itemIndex = filteredDataLength;
            
            let targetPage = Math.ceil(itemIndex / itemsPerPage);
            currentPage = targetPage;
            document.getElementById('pageInput').value = currentPage;
            
            renderGallery(document.getElementById('searchInput').value, true);
            
            setTimeout(() => {
                let indexOnPage = (itemIndex - 1) % itemsPerPage;
                let cards = document.querySelectorAll('#galleryGrid > div');
                if(cards[indexOnPage]) {
                    cards[indexOnPage].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    cards[indexOnPage].classList.add('highlight-item');
                    setTimeout(() => cards[indexOnPage].classList.remove('highlight-item'), 2000); 
                }
            }, 100); 
        }

        function createBackup() { localStorage.setItem('smartGalleryBackup', JSON.stringify(galleryData)); }
        
        function undoLastAction() {
            const backup = localStorage.getItem('smartGalleryBackup');
            if (backup) {
                if(confirm('KEMBALIKAN KEADAAN?\n\nAksi ini akan merestore galeri ke kondisi sebelum aksi terakhir Anda. Lanjutkan?')) {
                    galleryData = JSON.parse(backup);
                    localStorage.setItem('smartGalleryData', JSON.stringify(galleryData)); 
                    renderGallery();
                    alert('Data telah dikembalikan (Undo berhasil).');
                }
            } else alert('Tidak ada riwayat backup yang bisa di-undo.');
        }

        function clearCache() {
            if(confirm('MENGHAPUS SEMUA MEDIA?\n\nAnda yakin ingin mereset galeri ini?')) {
                createBackup(); 
                galleryData = [];
                localStorage.setItem('smartGalleryData', JSON.stringify(galleryData));
                renderGallery();
            }
        }
        
        function updateSelection() {
            const checkboxes = document.querySelectorAll('.item-checkbox:checked');
            const bulkActions = document.getElementById('bulkActions');
            const selectedCountSpan = document.getElementById('selectedCount');
            
            if (checkboxes.length > 0) { 
                bulkActions.classList.remove('hidden'); 
                bulkActions.classList.add('flex');
                selectedCountSpan.innerText = checkboxes.length; 
            } else { 
                bulkActions.classList.add('hidden'); 
                bulkActions.classList.remove('flex');
            }
            
            const allCheckboxes = document.querySelectorAll('.item-checkbox');
            const selectAllCb = document.getElementById('selectAllCheckbox');
            selectAllCb.checked = (allCheckboxes.length > 0 && checkboxes.length === allCheckboxes.length);
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('selectAllCheckbox').checked;
            document.querySelectorAll('.item-checkbox').forEach(cb => {
                if(cb.closest('.group').style.display !== 'none') { cb.checked = isChecked; }
            });
            updateSelection();
        }

        function deleteSelected() {
            const checkboxes = document.querySelectorAll('.item-checkbox:checked');
            if (checkboxes.length === 0) return;
            if (confirm(`MENGHAPUS ${checkboxes.length} ITEM?\n\nItem terpilih akan dihapus permanen.`)) {
                createBackup(); 
                const idsToDelete = Array.from(checkboxes).map(cb => cb.value);
                galleryData = galleryData.filter(item => !idsToDelete.includes(item.id));
                saveData(); 
            }
        }

        function markSelectedNsfw(makeNsfw) {
            const checkboxes = document.querySelectorAll('.item-checkbox:checked');
            if (checkboxes.length === 0) return;
            const actionText = makeNsfw ? "MENAMBAHKAN TAG NSFW" : "MENGHAPUS TAG NSFW";
            if (confirm(`Yakin ingin ${actionText} pada ${checkboxes.length} item terpilih?`)) {
                createBackup();
                const idsToUpdate = Array.from(checkboxes).map(cb => cb.value);
                galleryData = galleryData.map(item => {
                    if (idsToUpdate.includes(item.id)) {
                        let tagsArray = (item.tags || '').split(',').map(t => t.trim()).filter(t => t && t.toLowerCase() !== 'nsfw');
                        if (makeNsfw) tagsArray.push('nsfw');
                        item.tags = tagsArray.join(', '); item.updatedAt = new Date().toISOString();
                    }
                    return item;
                });
                saveData();
                document.getElementById('selectAllCheckbox').checked = false;
            }
        }

        function markSelectedCategory(catName) {
            const checkboxes = document.querySelectorAll('.item-checkbox:checked');
            if (checkboxes.length === 0) return;
            if (confirm(`Set kategori ${checkboxes.length} item terpilih menjadi '${catName}'?`)) {
                createBackup();
                const idsToUpdate = Array.from(checkboxes).map(cb => cb.value);
                galleryData = galleryData.map(item => {
                    if (idsToUpdate.includes(item.id)) {
                        item.category = catName;
                        item.updatedAt = new Date().toISOString();
                    }
                    return item;
                });
                saveData();
                document.getElementById('selectAllCheckbox').checked = false;
            }
        }

        function saveData() { localStorage.setItem('smartGalleryData', JSON.stringify(galleryData)); renderGallery(document.getElementById('searchInput').value, true); }
        
        function getYoutubeId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function detectMediaType(url) {
            if (url.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) return 'image';
            if (getYoutubeId(url)) return 'youtube';
            if (url.match(/\.(m3u|m3u8)(\?.*)?$/i)) return 'hls';
            if (url.match(/\.(mpd)(\?.*)?$/i)) return 'dash'; 
            if (url.match(/\.(mp4|webm|ogg|gifv)(\?.*)?$/i)) return 'video';
            if (url.includes('/embed/') || url.includes('/iframe/') || url.includes('vidgf.com/') || url.includes('cdeyy.de/')) return 'iframe_video'; 
            return 'website'; 
        }

        function getDomainName(url) { try { return new URL(url).hostname; } catch(e) { return url.substring(0, 20)+"..."; } }

        function toggleSafeMode() {
            isSafeMode = !isSafeMode;
            const btn = document.getElementById('safeModeBtn');

                header.classList.remove('bg-[#1A0000]'); header.classList.add('bg-[#000000]');
            } else {
                btn.innerHTML = "<span class='text-lg leading-none'>🔞</span> UNSAFE: OFF"; btn.className = "btn-wp7 text-[#D83B01] flex items-center gap-1";
                header.classList.remove('bg-[#000000]'); header.classList.add('bg-[#1A0000]');

        function renderGallery(filterText = document.getElementById('searchInput').value, keepPage = false) {
            grid.innerHTML = '';
            document.getElementById('selectAllCheckbox').checked = false; updateSelection();

            if (!keepPage) currentPage = 1;

            let displayData = [...galleryData];
            const sortVal = document.getElementById('sortSelect').value;
            
            if (isSafeMode) displayData = displayData.filter(item => !(item.tags || '').toLowerCase().includes('nsfw'));
            if (currentMediaFilter === 'image') displayData = displayData.filter(i => i.type === 'image');
            else if (currentMediaFilter === 'video') displayData = displayData.filter(i => ['video', 'youtube', 'iframe_video', 'hls', 'dash'].includes(i.type));
            else if (currentMediaFilter === 'website') displayData = displayData.filter(i => i.type === 'website');

            if(sortVal === 'oldest') displayData.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            else if(sortVal === 'newest') displayData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            else if(sortVal === 'category') displayData.sort((a, b) => a.category.localeCompare(b.category));

            if (filterText) displayData = displayData.filter(item => `${item.category} ${item.tags} ${item.notes}`.toLowerCase().includes(filterText.toLowerCase().trim()));
            
            filteredDataLength = displayData.length;
            document.getElementById('itemCount').innerText = filteredDataLength;
            
            const maxPage = Math.ceil(filteredDataLength / itemsPerPage) || 1;
            if (currentPage > maxPage) currentPage = maxPage;
            
            document.getElementById('pageInput').value = currentPage;
            document.getElementById('maxPageInfo').innerText = `/ ${maxPage}`;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedData = displayData.slice(startIndex, endIndex);

            paginatedData.forEach((item, index) => {
                let actualItemNumber = startIndex + index + 1;
                let mediaHtml = '';
                const isNsfw = (item.tags || '').toLowerCase().includes('nsfw');

                if (item.type === 'image') mediaHtml = `<img src="${item.url}" class="object-cover w-full h-full bg-[#111]" loading="lazy">`;
                else if (item.type === 'youtube') mediaHtml = `<img src="https://img.youtube.com/vi/${getYoutubeId(item.url)}/hqdefault.jpg" class="object-cover w-full h-full bg-[#111]" loading="lazy"><div class="absolute inset-0 flex items-center justify-center text-[#E81123]/80 text-5xl pointer-events-none">▶</div>`;
                else if (item.type === 'video') mediaHtml = `<video class="w-full h-full object-cover bg-[#111]" muted preload="metadata" loop><source src="${item.url}#t=1"></video><div class="absolute inset-0 flex items-center justify-center text-white/50 text-5xl font-light pointer-events-none">▶</div>`;
                else if (item.type === 'iframe_video') mediaHtml = `<div class="w-full h-full bg-[#111] flex flex-col items-center justify-center text-[#444]"><span class="text-4xl font-light mb-1">▶</span></div>`;
                else if (item.type === 'hls' || item.type === 'dash') {
                    let label = item.type === 'dash' ? 'DASH' : 'LIVE';
                    mediaHtml = `<div class="w-full h-full bg-[#111] flex flex-col items-center justify-center text-[#666] border border-[#222]"><span class="text-3xl mb-1">📡</span><span class="text-[9px] font-bold tracking-widest uppercase">${label}</span></div>`;
                }
                else if (item.type === 'website') mediaHtml = `<div class="w-full h-full bg-[#0078D7] flex flex-col items-center justify-center text-white p-2 text-center break-words"><span class="text-4xl font-light mb-2">🌐</span><span class="text-[9px] font-semibold tracking-widest uppercase truncate w-full">${getDomainName(item.url)}</span></div>`;

                const mainActionBtn = item.type === 'website'

                const checkboxHtml = `<input type="checkbox" class="item-checkbox absolute top-2 left-2 z-30 w-5 h-5 accent-[#0078D7] cursor-pointer drop-shadow-md outline-none rounded-none border border-white" value="${item.id}" onclick="event.stopPropagation(); updateSelection();">`;

                    ${isNsfw ? '<div class="absolute top-0 right-0 bg-[#D83B01] text-white text-[9px] font-bold px-1.5 py-0.5 z-10 pointer-events-none tracking-widest">NSFW</div>' : ''}

        // --- Core Processing Functions ---
        function recoverTruncatedJSON(text) {
            try {
                const regex = /\{[^{}]*"id"[^{}]*"url"[^{}]*"createdAt"[^{}]*\}/g;
                const matches = text.match(regex);
                if (matches && matches.length > 0) {
                    const recovered = [];
                    matches.forEach(m => { try { recovered.push(JSON.parse(m)); } catch(e) {} });
                    if(recovered.length > 0) return { app: "MyGalleryPro", data: recovered };
                }
            } catch(e) {} return null;
        }

        function processTxtImport(text) {
            let p;
            try { p = JSON.parse(text); } 
            catch(err) { 
                p = recoverTruncatedJSON(text);
                if (!p) { alert("Format TXT sangat rusak dan tidak bisa dipulihkan. Pastikan file valid."); return; } 
                else { alert("PERINGATAN: File terpotong sebagian!\nRecovery Engine telah menyelamatkan data link Anda."); }
            }

            if(p && p.app==="MyGalleryPro") { 
                createBackup(); 
                const existingIds = new Set(galleryData.map(i=>i.id)); 
                const existingUrls = new Set(galleryData.map(i=>i.url)); 
                let added = 0; let skipped = 0;
                
                p.data.forEach(i => { 
                    if(!existingIds.has(i.id) && !existingUrls.has(i.url)) { 
                        galleryData.push(i); 
                        existingIds.add(i.id); existingUrls.add(i.url); added++; 
                    } else { skipped++; }
                }); 
                saveData(); alert(`Merge Sukses! ${added} media ditambahkan.\n(${skipped} media diabaikan karena duplikat).`);
            } else { alert("Data tidak dikenali sebagai format MyGalleryPro."); }
        }

        function processM3uImport(text) {
            createBackup();
            const lines = text.split('\n');
            let count = 0; let skipped = 0; let currentCat = 'M3U Import'; let currentNote = '';
            const existingUrls = new Set(galleryData.map(i=>i.url)); 
            
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const catMatch = line.match(/group-title="([^"]+)"/i); if (catMatch) currentCat = catMatch[1];
                    const commaIdx = line.lastIndexOf(','); if (commaIdx > -1) currentNote = line.substring(commaIdx + 1).trim();
                } else if (line.startsWith('http')) {
                    if(!existingUrls.has(line)) {
                        galleryData.unshift({
                            id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                            url: line, type: detectMediaType(line), category: currentCat, tags: '', 
                            notes: currentNote || 'Streaming Channel', createdAt: new Date().toISOString()
                        }); 
                        existingUrls.add(line); count++;
                    } else { skipped++; }
                    currentNote = '';
                }
            });
            if(count > 0) { saveData(); alert(`${count} channel M3U di-import! (${skipped} duplikat diabaikan)`); }
            else { alert("Tidak ada link baru yang valid di M3U ini."); }
        }

        function openImportUrlModal() {
            document.getElementById('importUrlInput').value = '';
            document.getElementById('importUrlType').value = 'auto';
            document.getElementById('importUrlModal').classList.remove('hidden');
        }

        async function executeUrlImport() {
            const url = document.getElementById('importUrlInput').value.trim();
            const type = document.getElementById('importUrlType').value;
            const btn = document.getElementById('btnExecuteUrl');
            
            if(!url) return alert("Masukkan URL yang valid!");
            
            btn.innerText = "MEMUAT..."; btn.disabled = true;
            try {
                let response;
                try {
                    response = await fetch(url);
                    if(!response.ok) throw new Error("Gagal direct");
                } catch(e) {
                    response = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
                }
                
                if (!response.ok) throw new Error("Gagal mengambil data. URL mungkin tidak bisa diakses.");
                const textData = await response.text();
                
                if (textData.trim().startsWith('<!DOCTYPE html>') || textData.trim().startsWith('<html')) {
                    throw new Error("URL ini sepertinya diblokir oleh sistem keamanan jaringan internet Anda (Terdeteksi mengembalikan halaman HTML peringatan).");
                }
                
                let isM3u = false;
                if (type === 'm3u') isM3u = true;
                else if (type === 'txt') isM3u = false;
                else {
                    isM3u = url.toLowerCase().includes('.m3u') || textData.startsWith('#EXTM3U');
                }
                
                if (isM3u) processM3uImport(textData);
                else processTxtImport(textData);
                
                document.getElementById('importUrlModal').classList.add('hidden');
            } catch (err) {
                alert("Error saat mengunduh data: \n" + err.message + "\n\nPastikan URL valid atau gunakan proxy VPN jika diblokir jaringan.");
            } finally {
                btn.innerText = "AMBIL DATA"; btn.disabled = false;
            }
        }

        function exportData() { 
            if(!galleryData.length) return; 
            const fileName = prompt("Nama file backup TXT:", `MyGallery_${new Date().toISOString().split('T')[0]}`); 
            if(!fileName) return; 
            
            const jsonStr = JSON.stringify({ app: "MyGalleryPro", data: galleryData }, null, 2);
            const blob = new Blob([jsonStr], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a'); a.href = url; a.download = fileName + ".txt"; a.click(); 
            URL.revokeObjectURL(url);
        }

        }

        function importM3uData(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => { processM3uImport(ev.target.result); }; 
            r.readAsText(f); e.target.value = ''; 
        }

        function resetPanZoom() { currentScale = 1; panX = 0; panY = 0; const slider = document.getElementById('zoomSlider'); if(slider) slider.value = 1; updateTransform(); }

            if(activeDashEngine) { activeDashEngine.destroy(); activeDashEngine = null; } 
            document.body.style.overflow = 'auto'; 
            if (document.fullscreenElement) document.exitFullscreen(); 
        }
        
        function toggleNativeFullscreen() { if (!document.fullscreenElement) document.getElementById('viewerModal').requestFullscreen(); else document.exitFullscreen(); }

        function openM3uModal() {
            let vData = galleryData.filter(i => ['video','hls','iframe_video','dash'].includes(i.type));
            if(isSafeMode) { vData = vData.filter(item => !(item.tags || '').toLowerCase().includes('nsfw')); document.getElementById('m3uSafeWarning').innerText = "Safe Mode: Konten NSFW disembunyikan."; } 
            else { document.getElementById('m3uSafeWarning').innerText = "Uncensored: Semua dieksport."; }
            if(!vData.length) return alert("Tidak ada video.");
            const categories = [...new Set(vData.map(i => i.category || 'Uncategorized'))].sort();
            let html = '';
            categories.forEach(cat => { html += `<label class="flex items-center gap-4 p-3 bg-[#111] border border-[#333] cursor-pointer hover:bg-[#222] transition"><input type="checkbox" value="${cat}" class="m3u-cb w-5 h-5 accent-[#D83B01] rounded-none border-none" checked><span class="text-sm font-light text-white">${cat}</span></label>`; });
            document.getElementById('m3uCheckboxContainer').innerHTML = html; document.getElementById('m3uModal').classList.remove('hidden');
        }

        function executeM3uExport() {
            const checkedBoxes = document.querySelectorAll('.m3u-cb:checked'); if(checkedBoxes.length === 0) return alert("Pilih minimal 1 kategori!");
            const selectedCats = Array.from(checkedBoxes).map(cb => cb.value); const fileName = document.getElementById('m3uFileName').value || "My_TV_Playlist";
            let vData = galleryData.filter(i => ['video','hls','iframe_video','dash'].includes(i.type));
            if(isSafeMode) vData = vData.filter(item => !(item.tags || '').toLowerCase().includes('nsfw'));
            vData = vData.filter(item => selectedCats.includes(item.category || 'Uncategorized'));
            if(!vData.length) return alert("Data kosong.");
            
            let m3u = "#EXTM3U\n"; 
            vData.forEach(i => { 
                let isNsfw = (i.tags || '').toLowerCase().includes('nsfw');
                let baseName = (i.notes || 'Video').replace(/\n/g, ' ');
                
                let otherTags = (i.tags || '').split(',').map(t => t.trim()).filter(t => t && t.toLowerCase() !== 'nsfw');
                let tagString = otherTags.length > 0 ? ' (#' + otherTags.join(' #') + ')' : '';
                
                let channelName = isNsfw ? `[🔞 NSFW] ${baseName}${tagString}` : `${baseName}${tagString}`;

                m3u += `#EXTINF:-1 group-title="${i.category||'Uncategorized'}",${channelName}\n${i.url}\n`; 
            });
            
            const blob = new Blob([m3u], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = fileName+".m3u"; a.click();
            URL.revokeObjectURL(url);
            document.getElementById('m3uModal').classList.add('hidden');
        }

        renderGallery();
    </script>
</body>
</html>
